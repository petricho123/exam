<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 출제위원 — 본문 기반 시험 문제 생성기</title>
  <meta name="description" content="본문 텍스트를 붙여넣으면 AI가 엄격한 객관식 문제를 자동 출제합니다." />
  <meta name="theme-color" content="#0D1B2A" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- html2pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <header class="site-header no-print">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-stamp">出</span>
        <div class="logo-text">
          <span class="logo-title">AI 출제위원</span>
          <span class="logo-sub">본문 기반 시험 문제 자동 생성</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       CONTROL PANEL
  ══════════════════════════════════════ -->
  <main>
    <section class="control-panel no-print" id="controlPanel">

      <!-- API KEY -->
      <div class="panel-block" id="apiBlock">
        <label class="block-label" for="apiKeyInput">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
          Gemini API 키
        </label>
        <div class="api-input-row">
          <input
            type="password"
            id="apiKeyInput"
            class="text-input"
            placeholder="AIza..."
            autocomplete="off"
            spellcheck="false"
          />
          <button class="icon-btn" id="toggleApiVisibility" title="키 표시/숨김" aria-label="API 키 표시 토글">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <label class="checkbox-label">
          <input type="checkbox" id="rememberKey" />
          <span class="checkbox-custom"></span>
          이 기기에 API 키 기억하기 <span class="label-hint">(LocalStorage에만 저장, 서버 전송 없음)</span>
        </label>
      </div>

      <!-- TEXT INPUT -->
      <div class="panel-block">
        <label class="block-label" for="sourceText">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          본문 텍스트
        </label>
        <textarea
          id="sourceText"
          class="source-textarea"
          placeholder="시험 문제를 만들 본문 텍스트를 여기에 붙여넣으세요.&#10;&#10;본문이 길수록 더 많은 문제가 출제됩니다."
          spellcheck="false"
        ></textarea>
        <div class="char-count-row">
          <span id="charCount">0</span>자 입력됨
        </div>
      </div>

      <!-- OPTIONS -->
      <div class="panel-block options-row">
        <div class="option-group">
          <label class="block-label" for="questionCount">문제 수</label>
          <select id="questionCount" class="select-input">
            <option value="5">5문항</option>
            <option value="10" selected>10문항</option>
            <option value="15">15문항</option>
            <option value="20">20문항</option>
          </select>
        </div>
        <div class="option-group">
          <label class="block-label" for="difficultyLevel">난이도</label>
          <select id="difficultyLevel" class="select-input">
            <option value="easy">쉬움</option>
            <option value="medium" selected>보통</option>
            <option value="hard">어려움</option>
          </select>
        </div>
        <div class="option-group">
          <label class="block-label" for="examTitle">문제지 제목 (선택)</label>
          <input type="text" id="examTitle" class="text-input" placeholder="예: 1단원 핵심 정리" />
        </div>
      </div>

      <!-- GENERATE BUTTON -->
      <button class="generate-btn" id="generateBtn">
        <span class="btn-text">✦ 문제 출제하기</span>
        <span class="btn-loading hidden">
          <span class="spinner"></span>
          AI 출제위원이 문제를 엄격하게 검토 중입니다...
        </span>
      </button>

    </section>

    <!-- ══════════════════════════════════════
         RESULTS
    ══════════════════════════════════════ -->
    <section class="results-section hidden" id="resultsSection">

      <!-- RESULT TOOLBAR (no-print) -->
      <div class="result-toolbar no-print">
        <div class="result-meta">
          <span id="resultTitleDisplay"></span>
          <span class="meta-count" id="resultCount"></span>
        </div>
        <div class="toolbar-actions">
          <button class="tool-btn" id="toggleAllBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            전체 정답 보기
          </button>
          <button class="tool-btn primary" id="downloadPdfBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PDF 다운로드
          </button>
        </div>
      </div>

      <!-- PDF PRINT AREA -->
      <div id="pdfArea">
        <div class="pdf-header print-only">
          <div class="pdf-title-block">
            <div class="pdf-stamp">出</div>
            <div>
              <h1 class="pdf-main-title" id="pdfTitle"></h1>
              <p class="pdf-subtitle">AI 출제위원 생성 문제 · 본문 기반 객관식</p>
            </div>
          </div>
          <div class="pdf-meta-line">
            <span>문항 수: <strong id="pdfQuestionCount"></strong></span>
            <span>생성일: <strong id="pdfDate"></strong></span>
          </div>
        </div>

        <div id="questionsContainer"></div>
      </div>

    </section>

    <!-- ERROR TOAST -->
    <div class="toast hidden" id="errorToast">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMessage"></span>
    </div>

  </main>

  <footer class="site-footer no-print">
    <p>API 키는 브라우저 내에서만 사용됩니다. 서버로 전송되지 않습니다.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
